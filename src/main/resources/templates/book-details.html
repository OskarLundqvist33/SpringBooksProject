<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
    <head>
        <title>My booklist</title>
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    </head>
    <body>
            <div class="container mt-5">
            <div class="card shadow">
                <div class="card-header bg-primary text-white text-white">
                    <h2 th:text="${book.title}">Book Title</h2>
                </div>
                <div class="card-body">
                    <h5 class="text-muted">By: <span th:text="${book.author}">Author</span></h5>
                    <p><strong>Published:</strong> <span th:text="${book.publishDate}">Date</span></p>
                    <hr>
                    <h5>Description:</h5>
                    <p class="lead" th:text="${book.description}">There is not yet a description...</p>
                </div>
                <div class="card-footer">
                    <a href="/" class="btn btn-secondary">Back to the list</a>
                    <a th:href="@{/update/{id}(id=${book.id})}" class="btn btn-warning">Edit</a>
                </div>
            </div>
        </div>
    </body>
</html>
