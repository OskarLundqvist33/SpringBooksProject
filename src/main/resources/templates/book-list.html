<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <title>My booklist</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="container mt-5">

<h1 class="mb-4">My Books</h1>

<table class="table table-striped">
    <thead>
        <tr>
            <th>Titel</th>
            <th>Author</th>
            <th>Genre</th>
            <th>Era</th>
            <th>PublishDate</th>
            <th>ISBN</th>
            <th>Actions</th>
        </tr>
    </thead>
    <tbody>
        <tr th:each="book : ${books}">
            <td th:text="${book.title}">Titel</td>
            <td th:text="${book.author}">Author</td>
            <td th:text="${book.genre}">Genre</td>
            <td th:text="${book.era}">Era</td>
            <td th:text="${book.publishDate}">2024-03-19</td>
            <td th:text="${book.isbn}">ISBN</td>
            <td>
                <div sec:authorize="hasRole('ADMIN')">
                    <a th:href="@{/update/{id}(id=${book.id})}"
                       class="btn btn-primary btn-sm">
                        Edit
                    </a>
                    <a th:href="@{/delete/{id}(id=${book.id})}"
                       class="btn btn-danger btn-sm"
                       onclick="return confirm('Are you sure you want to remove the book?')">
                    Delete
                    </a>
                </div>
            </td>
        </tr>
    </tbody>
</table>

<nav class="navbar navbar-light bg-light">
    <div class="container-fluid">
        <a class="navbar-brand" href="/">Books</a>
        <div>
            <a sec:authorize="isAnonymous()" th:href="@{/login}" class="btn btn-outline-primary">Login</a>

            <span sec:authorize="isAuthenticated()">
                Welcome! <span sec:authentication="name"></span>
                <form th:action="@{/logout}" method="post" style="display: inline;">
                    <button type="submit" class="btn btn-outline-danger btn-sm">Log out</button>
                </form>
            </span>
        </div>
    </div>
</nav>

<div sec:authorize="hasRole('ADMIN')">
    <a href="/create" class="btn btn-primary">Add a new book</a>
</div>

</body>
</html>
